[pytest]
# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de ejecución
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --asyncio-mode=auto

# Marcadores
markers =
    asyncio: marca tests como async
    integration: marca tests de integración
    unit: marca tests unitarios
    slow: marca tests lentos

# Cobertura
[coverage:run]
source = src
omit = 
    */migrations/*
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
